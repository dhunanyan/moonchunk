<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoonChunk Playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>MoonChunk Playground</h1>
      <div class="actions">
        <button id="runBtn" type="button">Save & Run</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>playground/workdir/site.mncnk (watched)</h2>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="panel preview-panel">
        <h2>Preview (auto-refresh on save)</h2>
        <iframe id="preview" title="Generated HTML preview"></iframe>
      </section>
    </main>

    <section class="bottom">
      <div class="box">
        <h3>Diagnostics</h3>
        <pre id="diagnostics"></pre>
      </div>
      <div class="box">
        <h3>Logs</h3>
        <pre id="logs"></pre>
      </div>
      <div class="box">
        <h3>Generated Files</h3>
        <pre id="generated"></pre>
      </div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
